# resources/silver_pipelines.yml

resources:
  pipelines:

    oracle_cis_silver_pipeline:
      name: "Oracle CIS Silver Pipeline"
      catalog: ${var.silver_catalog}
      target: ${var.silver_schema_oracis01p}
      photon: true
      serverless: true

      libraries:
        - notebook:
            path: ../src/01_silver/silver.ipynb

      configuration:
        pipelines.incompatibleViewCheck.enabled: "false"

        # Bronze source
        pipeline.bronze_catalog: ${var.bronze_catalog}
        pipeline.bronze_schema: ${var.bronze_schema_oracis01p}

        # Silver target
        pipeline.silver_catalog: ${var.silver_catalog}
        pipeline.silver_schema: ${var.silver_schema_sfcrm01p}

        # Quarantine target
        pipeline.quarantine_catalog: ${var.quarantine_catalog}
        pipeline.quarantine_schema: ${var.quarantine_schema}

        # DQX metrics target
        pipeline.metrics_catalog: ${var.metrics_catalog}
        pipeline.metrics_schema: ${var.metrics_schema}

        # Must match top-level key in config/silver.yml
        pipeline.source_system: "oracis01p"

      environment:
        dependencies:
          - -r ../requirements.txt



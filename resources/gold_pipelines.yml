# resources/gold_pipelines.yml
resources:
  pipelines:

    customer_gold_pipeline:
      name: "customer CIS Gold Pipeline"
      catalog: ${var.gold_catalog}
      target: ${var.gold_schema_customer}
      photon: true
      serverless: true

      libraries:
        - notebook:
            path: ../src/02_gold/gold.py

      configuration:
        pipelines.incompatibleViewCheck.enabled: "false"

        pipeline.silver_catalog: ${var.silver_catalog}
        pipeline.silver_schema: ${var.silver_schema_oracis01p}

        pipeline.gold_catalog: ${var.gold_catalog}
        pipeline.gold_schema: ${var.gold_schema_customer}

        pipeline.quarantine_catalog: ${var.quarantine_catalog}
        pipeline.quarantine_schema: ${var.quarantine_schema}

        pipeline.metrics_catalog: ${var.metrics_catalog}
        pipeline.metrics_schema: ${var.metrics_schema}

        pipeline.source_system: "customer" #### change it to domain

      environment:
        dependencies:
          - -r ../requirements.txt


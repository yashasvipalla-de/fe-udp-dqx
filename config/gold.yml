# =====================================================================
# GOLD TABLE CONFIGURATION REGISTRY
# What's happening: Unified registry cataloging all gold-layer tables
# across every source system. Gold tables are materialized views that
# read from the corresponding silver tables
#
# To add a table: add an entry under the relevant source system key
# following the same pattern used in silver.yml.
# =====================================================================

tables:
  customer:
    customer_contact_summary:
      operation_type: materialized_view
      source_tables:
        - customer_account
        - customer_profile
        - customer_email_contact
      target_table: customer_contact_summary
      sql_file: customer_contact_summary.sql

      sql_parameters:
        HASH_BITS: "256"
        ACCOUNT_FILTER: "ACCOUNT.ACCOUNT_STATUS = 'ACTIVE'"
        EMAIL_FILTER: "EMAIL.EMAIL_STATUS = 'VALID' AND EMAIL.PREFERRED_EMAIL_FLAG = 'Y'"


    customer_account_profile_summary:
      operation_type: materialized_view
      source_tables:
        - customer_account
        - customer_profile
      target_table: customer_account_profile_summary
      sql_file: customer_account_profile_summary.sql
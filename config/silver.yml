# =====================================================================
# SILVER TABLE CONFIGURATION REGISTRY
# What's happening: Unified registry cataloging all target tables
# across every source system in a single file. Tables are grouped
# under their source system key. The active source system is resolved
# at runtime via the pipeline.source_system spark conf parameter.
#
# To add a new source system: add a new top-level key under `tables`
# (e.g. esriveg01p:) and list its tables below it — no other file changes
# needed.
#
# To add a table to an existing system: add an entry under the
# relevant source system key following the same pattern.
#
# Schema mapping (prod):
#   webp_ivmsp        → schema "webp"
#   esriveg01p        → schema "esriveg01p"
#   ssp_lifecycle01p  → schema "ssp_lifecycle01p"
# =====================================================================

tables:
  oracis01p:
    customer_account:
      description: "Customer account table containing account status and service location details."
      source_table: "customer_account"
      target_table: "customer_account"
      primary_keys:
        - ACCOUNT_ID
      exclude_columns: ""

    customer_profile:
      description: "Customer profile table containing customer name and customer type details."
      source_table: "customer_profile"
      target_table: "customer_profile"
      primary_keys:
        - CUSTOMER_ID

    customer_email_contact:
      description: "Customer email contact table containing preferred email information."
      source_table: "customer_email_contact"
      target_table: "customer_email_contact"
      primary_keys:
        - ACCOUNT_ID
        - EMAIL_ADDRESS
    

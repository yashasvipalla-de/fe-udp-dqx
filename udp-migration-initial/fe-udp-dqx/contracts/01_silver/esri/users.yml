kind: DataContract
apiVersion: v3.0.2
id: urn:datacontract:firstenergy:bronze:sap
name: SAP Bronze Domain Contract
version: 1.0.0
status: active
domain: firstenergy
dataProduct: sap

description:
  purpose: Bronze layer data quality contract for SAP East and SAP West source tables landed into Databricks.
  text: Applies DQX validations to raw SAP Bronze tables before promoting valid rows to Silver and routing invalid rows to quarantine.

schema:

  # -------------------------------------------------------------------
  # SAP East FKKVKP
  # -------------------------------------------------------------------
  - name: sapeast_FKKVKP
    physicalType: table
    description: Raw SAP East FKKVKP Bronze table containing contract account to business partner mappings.

    properties:
      - name: VKONT
        logicalType: string
        physicalType: STRING
        required: true
        description: SAP contract account number.
        quality:
          - type: custom
            engine: dqx
            description: VKONT must be populated.
            implementation:
              name: sapeast_fkkvkp_vkont_cannot_be_null_or_blank
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "VKONT IS NOT NULL AND TRIM(VKONT) <> ''"

      - name: GPART
        logicalType: string
        physicalType: STRING
        required: true
        description: SAP business partner identifier linked to the contract account.
        quality:
          - type: custom
            engine: dqx
            description: GPART must be populated.
            implementation:
              name: sapeast_fkkvkp_gpart_cannot_be_null_or_blank
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "GPART IS NOT NULL AND TRIM(GPART) <> ''"

  # -------------------------------------------------------------------
  # SAP West FKKVKP
  # -------------------------------------------------------------------
  - name: sapwest_FKKVKP
    physicalType: table
    description: Raw SAP West FKKVKP Bronze table containing contract account to business partner mappings.

    properties:
      - name: VKONT
        logicalType: string
        physicalType: STRING
        required: true
        description: SAP contract account number.
        quality:
          - type: custom
            engine: dqx
            description: VKONT must be populated.
            implementation:
              name: sapwest_fkkvkp_vkont_cannot_be_null_or_blank
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "VKONT IS NOT NULL AND TRIM(VKONT) <> ''"

      - name: GPART
        logicalType: string
        physicalType: STRING
        required: true
        description: SAP business partner identifier linked to the contract account.
        quality:
          - type: custom
            engine: dqx
            description: GPART must be populated.
            implementation:
              name: sapwest_fkkvkp_gpart_cannot_be_null_or_blank
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "GPART IS NOT NULL AND TRIM(GPART) <> ''"

  # -------------------------------------------------------------------
  # SAP East Account Email
  # -------------------------------------------------------------------
  - name: sapeast_ZCC_ACCNT_EMAIL
    physicalType: table
    description: Raw SAP East account email Bronze table containing contract account email addresses.

    properties:
      - name: VKONT
        logicalType: string
        physicalType: STRING
        required: true
        description: SAP contract account number associated with the email address.
        quality:
          - type: custom
            engine: dqx
            description: VKONT must be populated.
            implementation:
              name: sapeast_zcc_accnt_email_vkont_cannot_be_null_or_blank
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "VKONT IS NOT NULL AND TRIM(VKONT) <> ''"

      - name: SMTP_ADDR
        logicalType: string
        physicalType: STRING
        required: true
        description: SMTP email address associated with the contract account.
        quality:
          - type: custom
            engine: dqx
            description: SMTP_ADDR must be populated.
            implementation:
              name: sapeast_zcc_accnt_email_smtp_addr_cannot_be_null_or_blank
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "SMTP_ADDR IS NOT NULL AND TRIM(SMTP_ADDR) <> ''"

          - type: custom
            engine: dqx
            description: SMTP_ADDR must match a valid email format.
            implementation:
              name: sapeast_zcc_accnt_email_valid_email_format
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "SMTP_ADDR RLIKE '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'"

  # -------------------------------------------------------------------
  # SAP West Account Email
  # -------------------------------------------------------------------
  - name: sapwest_ZCC_ACCNT_EMAIL
    physicalType: table
    description: Raw SAP West account email Bronze table containing contract account email addresses.

    properties:
      - name: VKONT
        logicalType: string
        physicalType: STRING
        required: true
        description: SAP contract account number associated with the email address.
        quality:
          - type: custom
            engine: dqx
            description: VKONT must be populated.
            implementation:
              name: sapwest_zcc_accnt_email_vkont_cannot_be_null_or_blank
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "VKONT IS NOT NULL AND TRIM(VKONT) <> ''"

      - name: SMTP_ADDR
        logicalType: string
        physicalType: STRING
        required: true
        description: SMTP email address associated with the contract account.
        quality:
          - type: custom
            engine: dqx
            description: SMTP_ADDR must be populated.
            implementation:
              name: sapwest_zcc_accnt_email_smtp_addr_cannot_be_null_or_blank
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "SMTP_ADDR IS NOT NULL AND TRIM(SMTP_ADDR) <> ''"

          - type: custom
            engine: dqx
            description: SMTP_ADDR must match a valid email format.
            implementation:
              name: sapwest_zcc_accnt_email_valid_email_format
              criticality: error
              check:
                function: sql_expression
                arguments:
                  expression: "SMTP_ADDR RLIKE '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'"
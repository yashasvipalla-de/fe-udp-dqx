# =============================================================================
# Singlestore UDP —> Databricks migration · Declarative Automation Bundle
# -----------------------------------------------------------------------------
# Deploys the Lakeflow silver pipelines + DQX governance pipeline consistently
# across dev / qa / prod.
#
# CONTRIBUTOR MODEL — how to add or change an environment-specific value:
#   1. DECLARE it once under `variables:` (description only unless a safe default
#      is appropriate).
#   2. SET its concrete value per environment under `targets.<env>.variables:`.
#
# SCHEMA MODEL — Per-source-system schemas:
#   Bronze and silver layers use separate schemas for each source system
#   (webp, esriveg01p, ssp_lifecycle01p). In dev, all resolve to shared
#   sandbox schemas (sbx_bronze, sbx_silver, etc.). In prod/qa, each maps
#   to its real schema name.
# =============================================================================

bundle:
  name: fe-udp-migration
include:
  - resources/*.yml

# ─── VARIABLE DECLARATIONS ───────────────────────────────────────────────────
variables:
  # -- Shared catalogs (same catalog houses all source-system schemas) --
  bronze_catalog:
    description: "Bronze Ingestion Catalog (shared across all source systems)"
  silver_catalog:
    description: "Silver Clean Destination Catalog (shared across all source systems)"
  gold_catalog:
    description: "Gold Aggregated Business Catalog (shared across all source systems)"

  # -- Per-source-system bronze schemas --
  bronze_schema_oracis01p:
    description: "Bronze schema for Oracle CIS source system."
  bronze_schema_sfcrm01p:
    description: "Bronze schema for Salesforce CRM source system."

  # -- Per-source-system silver schemas --
  silver_schema_oracis01p:
    description: "Silver schema for Oracle CIS source system."
  silver_schema_sfcrm01p:
    description: "Silver schema for Salesforce CRM source system."


  # -- Per-source-system gold schemas --
  gold_schema_customer:
    description: "Gold schema for Customer domain."
  gold_schema_wmi:
    description: "Gold schema for WMI domain."

  # -- Shared infrastructure schemas (DQX quarantine + metrics) --
  quarantine_catalog:
    description: "Data Quality Quarantine Catalog"
  quarantine_schema:
    description: "Data Quality Quarantine Schema"

  metrics_catalog:
    description: "DQX Platform Metrics Catalog"
  metrics_schema:
    description: "DQX Platform Metrics Schema"

  # -- Infrastructure / deployment settings --
  root_path:
    description: "Workspace root path where this bundle's state and files deploy."
  cluster_policy_id:
    description: "Cluster policy ID for classic compute (serverless pipelines need none)."
    default: ""
  service_principal:
    description: "Service principal application ID for non-dev deployments."
    default: ""
  dev_schema:
    description: "Single unified schema for dev deployments. All layers resolve here."
    default: ""


workspace:
  root_path: ${var.root_path}

permissions:
  - level: CAN_MANAGE
    user_name: ${workspace.current_user.userName}

  # - level: CAN_VIEW
  #   group_name: group_name

presets:
  trigger_pause_status: PAUSED # If this bundle creates Jobs, their schedules will be paused.


# ─── TARGETS / ENVIRONMENTS ──────────────────────────────────────────────────
targets:
  # dev — personal development sandbox
  # All source-system schemas collapse to shared sbx_* schemas for convenience.
  dev:
    default: true
    mode: development
    resources:
      schemas:
        dev:
          catalog_name: ${var.bronze_catalog}
          name: ${var.dev_schema}
          comment: "Unified dev schema — all layers and source systems"

    variables:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev
      cluster_policy_id: ""
      service_principal: ""

      dev_schema: "ss_dev"

      # Shared catalogs — all point to sandbox in dev
      bronze_catalog: "sandbox"
      silver_catalog: "sandbox"
      gold_catalog: "sandbox"
      quarantine_catalog: "sandbox"
      metrics_catalog: "sandbox"

      # Bronze stays separate — it is source data, not created by these pipelines
      bronze_schema_oracis01p: "ss_bronze"
      bronze_schema_sfcrm01p: "ss_bronze"

      # Silver, gold, quarantine, metrics all collapse to the single dev schema
      silver_schema_oracis01p: "${var.dev_schema}"
      silver_schema_sfcrm01p: "${var.dev_schema}"
      gold_schema_customer: "${var.dev_schema}"
      gold_schema_wmi: "${var.dev_schema}"
      quarantine_schema: "${var.dev_schema}"
      metrics_schema: "${var.dev_schema}"


  # qa — staging / pre-production
  qa:
    mode: production
    variables:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/qa
      cluster_policy_id: ""
      service_principal: ""

      bronze_catalog: ""
      silver_catalog: ""
      gold_catalog: ""

 
      bronze_schema_oracis01p: "bronze_oracle_cis"
      bronze_schema_sfcrm01p: "bronze_salesforce_crm"

      silver_schema_oracis01p: "silver_oracle_cis"
      silver_schema_sfcrm01p: "silver_salesforce_crm"

      gold_schema_customer: "gold_oracle_cis"
      gold_schema_wmi: "gold_salesforce_crm"

      quarantine_catalog: ""
      quarantine_schema: ""
      metrics_catalog: ""
      metrics_schema: ""


  prod:
    mode: production
    variables:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/prod
      cluster_policy_id: ""
      service_principal: ""

      bronze_catalog: ""
      silver_catalog: ""
      gold_catalog: ""


      bronze_schema_oracis01p: "bronze_oracle_cis"
      bronze_schema_sfcrm01p: "bronze_salesforce_crm"

      silver_schema_oracis01p: "silver_oracle_cis"
      silver_schema_sfcrm01p: "silver_salesforce_crm"

      gold_schema_customer: "gold_oracle_cis"
      gold_schema_wmi: "gold_salesforce_crm"

      quarantine_catalog: ""
      quarantine_schema: ""
      metrics_catalog: ""
      metrics_schema: ""
